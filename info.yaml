# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id: "469807727892699137" # Set this to the ID of your Wokwi project (the number from the project's URL)
  title: "2:1 Mux with differential outputs Armin" # Project title
  author: "Armin" # Your name
  discord: "armin5651" # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description: "Working project, Montenegro" # One line description of what your project does
  language: "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 33 # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1" # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "A1 (mux 1 data A)"
  ui[1]: "B1 (mux 1 data B)"
  ui[2]: "A2 (mux 2 data A)"
  ui[3]: "B2 (mux 2 data B)"
  ui[4]: "A3 (mux 3 data A)"
  ui[5]: "B3 (mux 3 data B)"
  ui[6]: ""
  ui[7]: "SEL (select, common to all muxes)"

  # Outputs
  uo[0]: "Y1_N (mux 1 inverted output)"
  uo[1]: "Y1 (mux 1 output)"
  uo[2]: "Y2_N (mux 2 inverted output)"
  uo[3]: "Y2 (mux 2 output)"
  uo[4]: "Y3_N (mux 3 inverted output)"
  uo[5]: "Y3 (mux 3 output)"
  uo[6]: "Y4_N (mux 4 inverted output)"
  uo[7]: "Y4 (mux 4 output)"

  # Bidirectional pins
  uio[0]: "A4 (mux 4 data A, input)"
  uio[1]: "B4 (mux 4 data B, input)"
  uio[2]: "POL1 (output polarity control, input)"
  uio[3]: "POL2 (output polarity control, input)"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
